<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroTrail | Packages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="packages">
  <header class="topbar">
    <div class="brand">AeroTrail</div>
    <nav class="top-links">
      <a href="index.html" data-page="dashboard">Dashboard</a>
      <a href="packages.html" data-page="packages">Packages</a>
      <a href="bookings.html" data-page="bookings">Bookings</a>
      <a href="payments.html" data-page="payments">Payments</a>
      <a href="reviews.html" data-page="reviews">Reviews</a>
      <a href="hub.html" data-page="hub">Data Hub</a>
    </nav>
    <button id="quickBookBtn" class="btn btn-primary">Quick Book</button>
  </header>

  <div class="layout">
<main class="content">
      <div class="page-head">
        <div>
          <h1>Packages</h1>
          <p>Tables: `destinations`, `packages`, `package_details`, `hotels`, `transport`</p>
        </div>
        <button class="btn btn-soft" id="openBookingBtn">Open Booking Form</button>
      </div>

      <div class="filters">
        <input id="searchInput" type="search" placeholder="Search title or city" />
        <select id="cityFilter"></select>
        <select id="durationFilter">
          <option value="">Any Duration</option>
          <option value="3">Up to 3 Days</option>
          <option value="5">Up to 5 Days</option>
          <option value="7">Up to 7 Days</option>
        </select>
        <select id="sortFilter">
          <option value="">Sort By</option>
          <option value="price_asc">Price Low to High</option>
          <option value="price_desc">Price High to Low</option>
          <option value="rating_desc">Hotel Rating</option>
        </select>
      </div>

      <div id="packageGrid" class="package-grid"></div>
    </main>

    <footer class="footer">© <span id="year"></span> AeroTrail Travel Management System</footer>
  </div>

  <div id="bookingModal" class="modal hidden">
    <div class="modal-content" id="book">
      <button class="close-btn" id="closeBookingModal">x</button>
      <h3 style="margin-bottom: 8px;">Create Booking</h3>
      <p style="margin-bottom: 12px; color: #607182;">Mapped: `bookings` + `payments` tables</p>
      <form id="bookingForm" class="booking-form">
        <select id="bookingUser"></select>
        <select id="bookingPackage"></select>
        <input id="travelDate" type="date" required />
        <input id="peopleCount" type="number" min="1" max="12" value="2" required />
        <select id="bookingStatus">
          <option value="Confirmed">Confirmed</option>
          <option value="Pending">Pending</option>
          <option value="Cancelled">Cancelled</option>
        </select>
        <select id="paymentMethod">
          <option value="UPI">UPI</option>
          <option value="Card">Card</option>
          <option value="Net Banking">Net Banking</option>
          <option value="Cash">Cash</option>
        </select>
        <button class="btn btn-primary" type="submit">Save Booking + Payment</button>
      </form>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
