<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroTrail | Reviews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="reviews">
  <header class="topbar">
    <div class="brand">AeroTrail</div>
    <nav class="top-links">
      <a href="index.html" data-page="dashboard">Dashboard</a>
      <a href="packages.html" data-page="packages">Packages</a>
      <a href="bookings.html" data-page="bookings">Bookings</a>
      <a href="payments.html" data-page="payments">Payments</a>
      <a href="reviews.html" data-page="reviews">Reviews</a>
      <a href="hub.html" data-page="hub">Data Hub</a>
    </nav>
    <button id="quickBookBtn" class="btn btn-primary">Quick Book</button>
  </header>

  <div class="layout">
<main class="content">
      <div class="page-head">
        <div>
          <h1>Reviews</h1>
          <p>Table: `reviews` linked with users and packages</p>
        </div>
      </div>

      <form id="reviewForm" class="review-form panel" style="padding: 12px; margin-bottom: 12px;">
        <select id="reviewUser"></select>
        <select id="reviewPackage"></select>
        <select id="reviewRating">
          <option value="5">5 Star</option>
          <option value="4">4 Star</option>
          <option value="3">3 Star</option>
          <option value="2">2 Star</option>
          <option value="1">1 Star</option>
        </select>
        <input id="reviewComment" type="text" maxlength="180" placeholder="Write comment" required />
        <button class="btn btn-primary" type="submit">Add Review</button>
      </form>

      <div id="reviewList" class="review-list"></div>
    </main>

    <footer class="footer">© <span id="year"></span> AeroTrail Travel Management System</footer>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
